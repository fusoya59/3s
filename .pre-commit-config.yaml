# .pre-commit-config.yaml
# Mirrors CI lint + test jobs from .github/workflows/ci.yml
repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --timeout=5m
        language: system
        types: [go]
        pass_filenames: false

      - id: govulncheck
        name: govulncheck
        entry: govulncheck ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test -race
        entry: go test -race ./...
        language: system
        types: [go]
        pass_filenames: false
